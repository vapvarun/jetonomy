name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── PHPUnit matrix: PHP 8.1/8.2/8.3 × WP 6.7/6.8/6.9 ───────────────────
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3']
        wp: ['6.7', '6.8', '6.9']
      fail-fast: false

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wp_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Checkout Jetonomy Pro
        uses: actions/checkout@v4
        with:
          repository: vapvarun/jetonomy-pro
          token: ${{ secrets.PRO_REPO_TOKEN }}
          path: ../jetonomy-pro

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, mbstring, intl
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Install WordPress test library
        env:
          WP_VERSION: ${{ matrix.wp }}
        run: bash bin/install-wp-tests.sh wp_tests root root 127.0.0.1 "$WP_VERSION"

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox

  # ── CLI QA (full WordPress via wp-env + demo data) ───────────────────────
  cli-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Jetonomy Pro
        uses: actions/checkout@v4
        with:
          repository: vapvarun/jetonomy-pro
          token: ${{ secrets.PRO_REPO_TOKEN }}
          path: ../jetonomy-pro

      - name: Setup Node.js (for wp-env)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, mbstring, intl

      - name: Install wp-env
        run: npm -g install @wordpress/env

      - name: Start wp-env
        run: wp-env start

      - name: Activate plugins and seed demo data
        run: |
          wp-env run cli -- wp plugin activate jetonomy jetonomy-pro
          wp-env run cli -- wp rewrite flush
          wp-env run cli -- wp jetonomy demo-seed

      - name: Run CLI QA (structure)
        run: wp-env run cli -- wp jetonomy qa --report

      - name: Run CLI QA (actions)
        run: wp-env run cli -- wp jetonomy qa-actions

  # ── WordPress Coding Standards ────────────────────────────────────────────
  wpcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, mbstring

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run WordPress Coding Standards
        run: vendor/bin/phpcs --standard=WordPress includes/ templates/

  # ── PHPStan static analysis ───────────────────────────────────────────────
  phpstan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, mbstring

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse includes/ --level=5
