name: CI

on:
  push:
    # '*-dev' makes release branches CI-gated BEFORE merge — main sat red
    # for three weeks (2026-05-23 → 06-11) because dev work only met CI
    # after merging.
    branches: [main, master, 'v*', '*-dev']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── PHP Lint: syntax check across PHP versions ─────────────────────────
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - name: Check syntax
        run: find includes/ templates/ -name '*.php' -exec php -l {} + 2>&1 | grep -v 'No syntax errors' | head -50; test ${PIPESTATUS[0]} -eq 0

  # ── PHPUnit matrix: PHP 8.1/8.2/8.3/8.4 × WP 6.7/6.8/6.9 ─────────────
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        wp: ['6.7', '6.8', '6.9']
      fail-fast: false

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wp_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, mbstring, intl
          coverage: none

      - name: Install system dependencies
        run: sudo apt-get install -y subversion

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Install WordPress test library
        env:
          WP_VERSION: ${{ matrix.wp }}
        run: bash bin/install-wp-tests.sh wp_tests root root 127.0.0.1 "$WP_VERSION" true

      - name: Run PHPUnit (free standalone — every non-pro testsuite)
        # Previously only 'unit' ran here, leaving integration/security/
        # error-paths/concurrency gated solely by the combo job (which
        # needs the PRO_PAT secret and was pinned to a stale Pro ref).
        # All of these suites pass in free-standalone mode.
        env:
          JETONOMY_TEST_SKIP_PRO: '1'
        run: vendor/bin/phpunit --testdox --testsuite=unit,integration,security,error-paths,concurrency

  # ── PHPUnit combo: Free + Pro loaded together ─────────────────────────────
  # Exercises the Pro testsuite alongside the free unit testsuite so any
  # regression that only shows up when both plugins are active (e.g. Pro
  # hooks interfering with free journey code paths) is caught in CI.
  #
  # Requires a PAT with read access to jetonomy-pro stored as PRO_PAT.
  # Pinned to a single ref (v1.3.0) rather than github.ref_name to avoid
  # any indirect workflow injection via branch name manipulation.
  phpunit-with-pro:
    runs-on: ubuntu-latest
    # Skip when PRO_PAT secret isn't configured — checkout step would otherwise
    # fail with "Input required and not supplied: token" and turn CI red for an
    # infra reason. Also skip on cross-repo PRs (forks never receive secrets).
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && vars.PRO_PAT_CONFIGURED == 'true' }}
    strategy:
      matrix:
        php: ['8.2', '8.4']
        wp: ['6.8', '6.9']
      fail-fast: false

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wp_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout jetonomy (free)
        uses: actions/checkout@v4
        with:
          path: jetonomy

      - name: Checkout jetonomy-pro
        uses: actions/checkout@v4
        with:
          repository: vapvarun/jetonomy-pro
          token: ${{ secrets.PRO_PAT }}
          path: jetonomy-pro
          # Lockstep pair selection. Both branches of the expression are
          # HARDCODED literals (github.ref_name is only compared, never
          # emitted), so no branch-name injection is possible — same
          # guarantee as the previous fixed pin, without testing free HEAD
          # against a Pro frozen at v1.3.0 (two minors stale when caught).
          # Bump the '1.5.0-dev' literal when a new dev cycle opens.
          ref: ${{ github.ref_name == '1.5.0-dev' && '1.5.0-dev' || 'master' }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, mbstring, intl
          coverage: none

      - name: Install system dependencies
        run: sudo apt-get install -y subversion

      - name: Install Composer dependencies (free)
        working-directory: jetonomy
        run: composer install --no-progress --prefer-dist

      - name: Install WordPress test library
        working-directory: jetonomy
        env:
          WP_VERSION: ${{ matrix.wp }}
        run: bash bin/install-wp-tests.sh wp_tests root root 127.0.0.1 "$WP_VERSION" true

      - name: Verify Pro is reachable from bootstrap
        working-directory: jetonomy
        run: |
          if [ ! -f ../jetonomy-pro/jetonomy-pro.php ]; then
            echo "::error::jetonomy-pro not found at ../jetonomy-pro/ — combo job cannot run."
            exit 1
          fi
          echo "Pro plugin located at $(realpath ../jetonomy-pro/jetonomy-pro.php)"

      - name: Run PHPUnit (free + pro combined)
        working-directory: jetonomy
        run: vendor/bin/phpunit --testdox

  # ── PHPStan static analysis ──────────────────────────────────────────────
  phpstan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, mbstring

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Download BuddyPress for type stubs
        run: |
          mkdir -p /tmp/bp-stubs
          curl -sL "https://downloads.wordpress.org/plugin/buddypress.latest-stable.zip" -o /tmp/bp.zip
          unzip -q /tmp/bp.zip -d /tmp/bp-stubs

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse -c phpstan.neon.dist

  # ── WPCS coding standards ───────────────────────────────────────────────
  wpcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: cs2pr
      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist
      - name: Run WPCS
        run: |
          vendor/bin/phpcs --standard=.phpcs.xml.dist --report=summary || true
          ERRORS=$(vendor/bin/phpcs --standard=.phpcs.xml.dist --report=json 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('totals',{}).get('errors',0))" 2>/dev/null || echo "0")
          echo "WPCS errors: $ERRORS"
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::WPCS found $ERRORS error(s)"
            exit 1
          fi

  # ── Plugin Check (PCP) ──────────────────────────────────────────────────
  plugin-check:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wp_pcp
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, mbstring

      - name: Install WordPress
        run: |
          mkdir -p /tmp/wp
          curl -sL https://wordpress.org/latest.tar.gz | tar xz -C /tmp/wp --strip-components=1
          cp /tmp/wp/wp-config-sample.php /tmp/wp/wp-config.php
          sed -i "s/database_name_here/wp_pcp/" /tmp/wp/wp-config.php
          sed -i "s/username_here/root/" /tmp/wp/wp-config.php
          sed -i "s/password_here/root/" /tmp/wp/wp-config.php
          sed -i "s/localhost/127.0.0.1/" /tmp/wp/wp-config.php

      - name: Setup WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

      - name: Install WordPress
        run: |
          wp core install --path=/tmp/wp --url=http://localhost --title=Test --admin_user=admin --admin_password=admin --admin_email=admin@test.com --skip-email

      - name: Install plugin and Plugin Check
        run: |
          ln -s "$GITHUB_WORKSPACE" /tmp/wp/wp-content/plugins/jetonomy
          wp plugin activate jetonomy --path=/tmp/wp
          wp option update jetonomy_setup_complete 1 --path=/tmp/wp
          wp rewrite flush --path=/tmp/wp
          wp plugin install plugin-check --activate --path=/tmp/wp

      - name: Clean non-dist files for PCP
        run: |
          cd /tmp/wp/wp-content/plugins/jetonomy
          rm -rf node_modules vendor dist .git .github tests bin tools .githooks plans docs marketing

      - name: Run Plugin Check
        run: |
          RESULT=$(wp plugin check jetonomy --path=/tmp/wp --format=csv 2>&1)
          NOISE='compressed_files|hidden_files|application_detected|missing_direct_file_access_protection|outdated_tested_upto_header|stable_tag_mismatch|plugin_updater_detected|DirectDB.UnescapedDBParameter|PreparedSQL.NotPrepared|MissingTranslatorsComment|Heredoc.NotAllowed|EscapeOutput'
          CODE_ERRORS=$(echo "$RESULT" | awk -F',' -v noise="$NOISE" '
            /^FILE:/ { file=$0; gsub(/^FILE: /, "", file); next }
            $3 == "ERROR" {
              if (file ~ /^tests\//) next
              if (file ~ /^bin\//) next
              if (file ~ /^tools\//) next
              if (file ~ /^\.githooks\//) next
              if (file ~ /^plans\//) next
              if (file ~ /^docs\//) next
              if (file ~ /^marketing\//) next
              if (file ~ /^dist\//) next
              if (file ~ /^vendor\//) next
              if (file ~ /^node_modules\//) next
              match_noise = 0
              split(noise, n, "|")
              for (k in n) { if ($4 ~ n[k]) { match_noise = 1; break } }
              if (match_noise) next
              count++
              print "  " file ":" $1 " " $4
            }
            END { print "\nActionable errors: " count+0 }
          ')
          echo "$CODE_ERRORS"
          FINAL_COUNT=$(echo "$CODE_ERRORS" | tail -1 | grep -o '[0-9]*$')
          if [ "$FINAL_COUNT" -gt 0 ]; then
            echo "::error::Plugin Check found $FINAL_COUNT actionable error(s)"
            exit 1
          fi
