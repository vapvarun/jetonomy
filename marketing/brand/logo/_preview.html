<!doctype html><html><head><meta charset="utf-8">
<style>
  body{margin:0;font-family:Inter,system-ui,sans-serif;background:#f4f5f7;color:#1F2733}

  h2{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#9aa1ab;margin:32px 0 12px}
  .row{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
  .tile{border-radius:16px;padding:28px;display:flex;align-items:center;justify-content:center}
  .light{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .dark{background:#16181d}
  .brand{background:linear-gradient(135deg,#3B82F6,#7C3AED)}
  .fav{display:flex;gap:18px;align-items:flex-end}
  .fav div{text-align:center;color:#9aa1ab;font-size:11px}
  svg{display:block}
</style></head>
