flow_id: "C05"
title: "Save post as draft"
source: "design-spec"
priority: P2
actor: member

user_story: |
  As a space member, when I write a post and choose "Save as draft" from
  the publish menu instead of publishing, I expect the post to be saved
  with a draft status in the database so I can return and finish it later,
  without it being visible to other members.

expectations:
  draft_saved_in_db: true
  db_status_is_draft: true
  no_console_errors: true
  max_clicks_to_save_draft: 7
  max_time_to_goal_seconds: 15
