flow_id: "C21"
title: "Open in-app notifications"
source: "design-spec"
priority: P0
actor: member

user_story: |
  As a logged-in user with unread notifications, when I click the bell
  icon in the community nav, I expect a dropdown panel to open showing
  my notification items, a "View all notifications" link, and a "Mark
  all read" button.

expectations:
  bell_icon_visible: true
  panel_opens_on_click: true
  notification_items_loaded: true
  view_all_link_present: true
  mark_all_read_button_present: true
  no_console_errors: true
  max_clicks_to_open: 1
  max_time_to_goal_seconds: 10
