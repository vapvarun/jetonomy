flow_id: "PRO-POLLS-05"
title: "Retract vote"
source: "design-spec"
priority: P1
actor: pro-polls

user_story: |
  As a member who has already voted, I can click "Retract" or "Change Vote"
  to remove my vote. The poll returns to the voting state and the vote
  row is deleted from the database.

expectations:
  retract_button_visible: true
  vote_removed_from_db: true
  poll_returns_to_voting_state: true
  no_console_errors: true
  max_clicks_to_goal: 1
