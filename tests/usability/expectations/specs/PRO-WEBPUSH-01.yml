flow_id: "PRO-WEBPUSH-01"
title: "Grant permission + subscribe"
source: "design-spec"
priority: P0
actor: pro-web-push

user_story: |
  As a member, I can click "Enable Push Notifications" on my profile
  settings. The browser asks for permission, subscribes via the Push API,
  and the subscription is stored in wp_jt_pro_push_subscriptions.

expectations:
  subscribe_button_visible: true
  subscription_persisted_to_db: true
  success_indicator_shown: true
  no_console_errors: true
  max_clicks_to_goal: 1
