flow_id: "PRO-MESSAGING-05"
title: "Open conversation thread"
source: "design-spec"
priority: P0
actor: pro-messaging

user_story: |
  As a member, when I click a conversation row in my inbox, I expect to
  see the full message thread with all messages rendered chronologically.

expectations:
  thread_loads_with_messages: true
  messages_rendered_chronologically: true
  no_console_errors: true
  max_clicks_to_goal: 1
  max_time_to_goal_seconds: 10
