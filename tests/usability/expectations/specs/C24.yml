flow_id: "C24"
title: "Configure notification preferences"
source: "design-spec"
priority: P1
actor: member

user_story: |
  As a community member editing my profile, I expect to see a notification
  preferences grid with Web and Email toggles for each notification type
  (reply to post, reply to reply, mention, etc.). The checkbox states must
  reflect my previously saved preferences from the database. If a checkbox
  shows unchecked when the DB says I enabled it, saving the form would
  silently disable notifications I opted into.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  notif_prefs_section_visible: true
  checkbox_count_sufficient: true
  expected_types_present: true
  checkbox_states_match_db: true
