flow_id: "PRO-EMAILDIGEST-05"
title: "Digest includes subscribed spaces"
source: "design-spec"
priority: P1
actor: pro-email-digest

user_story: |
  The digest email should only include activity from spaces the user is
  subscribed to, not all spaces.

expectations:
  content_from_subscribed_spaces: true
  no_content_from_unsubscribed_spaces: true
  no_console_errors: true
