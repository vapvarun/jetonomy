flow_id: "C12"
title: "Delete own reply"
source: "design-spec"
priority: P1
actor: member

user_story: |
  As the author of a reply, when I open the more-menu, click Delete, and
  confirm the dialog, I expect the reply to disappear from the thread and
  the database row to be removed or soft-deleted.

expectations:
  reply_removed_from_dom: true
  reply_removed_from_db: true
  no_console_errors: true
  max_clicks_to_delete: 3
  max_time_to_goal_seconds: 10
