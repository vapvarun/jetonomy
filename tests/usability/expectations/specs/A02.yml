flow_id: "A02"
title: "Browse a public category"
source: "design-spec"
priority: P0
actor: anonymous

user_story: |
  As an anonymous visitor, when I navigate to /community/category/community/,
  I expect to see the category page with space cards rendered inside it.
  The page should not be a 404 and should have at least one space listed.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  community_container_visible: true
  space_cards_present: true
