flow_id: "PRO-POLLS-01"
title: "Create poll on new post"
source: "design-spec"
priority: P0
actor: pro-polls

user_story: |
  As a member creating a new post, I can toggle the poll panel, add options,
  and submit. The poll and its options are stored in the database alongside
  the post.

expectations:
  poll_panel_toggleable: true
  poll_persisted_to_db: true
  poll_options_count_gte_2: true
  no_console_errors: true
  max_clicks_to_goal: 3
  max_time_to_goal_seconds: 15
