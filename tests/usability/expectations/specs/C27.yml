flow_id: "C27"
title: "Unsubscribe from space/post"
source: "design-spec"
priority: P1
actor: member

user_story: |
  As a space member who is already following a space, when I click the
  "Following" button again, I expect it to toggle back to "Follow", the
  .jt-following class to be removed, and the subscription row to be
  deleted from wp_jt_subscriptions.

expectations:
  button_reverts_to_follow: true
  following_class_removed: true
  subscription_row_removed: true
  no_console_errors: true
  max_clicks_to_unsubscribe: 1
  max_time_to_goal_seconds: 10
