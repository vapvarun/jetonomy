flow_id: "PRO-POLLS-04"
title: "See live tallies + percentages"
source: "design-spec"
priority: P0
actor: pro-polls

user_story: |
  As a member who has voted, I can see the poll results with percentage
  bars and total vote count displayed per option.

expectations:
  percentage_bars_visible: true
  total_vote_count_displayed: true
  no_console_errors: true
  max_clicks_to_goal: 2
