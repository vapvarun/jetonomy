flow_id: "C30"
title: "Remove a bookmark"
source: "design-spec"
priority: P2
actor: member

user_story: |
  As a member who has bookmarked a post, when I click the Remove Bookmark
  button on the post page, I expect the bookmark to be deleted from the
  database and the post to no longer appear on my Bookmarks tab.
  (Currently fixme: bookmark button not found.)

expectations:
  bookmark_removed_from_db: true
  no_console_errors: true
