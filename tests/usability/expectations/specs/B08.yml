flow_id: "B08"
title: "Bookmark content for later"
source: "design-spec"
priority: P2
actor: registered

user_story: |
  As a registered user (bob), when I view a post, I expect to find a
  bookmark/save button that lets me save the post for later reference.
  The button should be visible and enabled. If the bookmark feature is
  not yet implemented, the test is marked as fixme.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  bookmark_button_visible: true
  bookmark_button_enabled: true
