flow_id: "D02"
title: "Edit other users' posts (TL3+)"
source: "design-spec"
priority: P1
actor: trusted

user_story: |
  As a trusted member at TL3, I want to edit posts authored by other
  users so that I can help maintain content quality across the community
  without needing moderator privileges.

preconditions:
  - alice (user 3) at TL3
  - A post by bob (user 4) in the welcome space

steps:
  - Set alice to TL3 via DB
  - Seed a post by bob
  - Login as alice and navigate to bob's post
  - Open more-menu and click Edit
  - Change the title and save
  - Assert the updated title appears on the page

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  edit_button_visible_to_tl3: true
  post_title_updated_in_ui: true
  max_clicks: 6
  max_time_seconds: 15

cleanup:
  - Delete the seeded post
  - Reset alice trust_level to 1
