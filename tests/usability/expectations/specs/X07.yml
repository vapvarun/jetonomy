flow_id: "X07"
title: "Akismet pre-check — fixme if not active"
source: "design-spec"
priority: P1
actor: cross-cutting

user_story: |
  As a site admin with Akismet active, I expect Jetonomy to register
  a spam check hook so posts are screened before publishing. Fixme
  if Akismet is not active on this environment.

expectations:
  flow_completes_without_error: true
  akismet_hook_registered_or_fixme: true
