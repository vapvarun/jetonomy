flow_id: "GA06"
title: "Category CRUD"
source: "design-spec"
priority: P0
actor: site-admin

user_story: |
  As a site admin managing forum categories, I visit the categories admin
  page and expect to see a list of all existing categories with an add-new
  form. The number of rows displayed in the table must match the actual
  count of categories in wp_jt_categories so I know no categories are
  silently missing or duplicated.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  category_list_visible: true
  add_form_visible: true
  no_php_fatal: true
  category_count_matches_db: true
