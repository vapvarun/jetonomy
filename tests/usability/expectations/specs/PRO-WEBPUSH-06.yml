flow_id: "PRO-WEBPUSH-06"
title: "Multi-device same user"
source: "design-spec"
priority: P1
actor: pro-web-push

user_story: |
  A single user can have multiple push subscriptions (one per device).
  Both subscriptions should coexist in the database.

expectations:
  multiple_subscriptions_allowed: true
  both_subscriptions_in_db: true
  no_console_errors: true
