flow_id: "PRO-ADVANCEDMODERATION-04"
title: "Hold action queues for moderation"
source: "design-spec"
priority: P0
actor: pro-advanced-moderation

user_story: |
  As a user, when my post triggers a hold rule, the post should be queued
  in the moderation queue for admin review.

expectations:
  flow_completes_without_error: true
  post_status_is_held: true
