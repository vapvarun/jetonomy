flow_id: "C11"
title: "Edit own reply"
source: "design-spec"
priority: P1
actor: member

user_story: |
  As the author of a reply, when I open the reply more-menu, click Edit,
  change the content, and save, I expect the updated text to appear
  immediately in the thread without a page reload.

expectations:
  edit_mode_opens: true
  updated_content_visible: true
  no_console_errors: true
  max_clicks_to_save: 6
  max_time_to_goal_seconds: 15
