flow_id: "PRO-WEBPUSH-03"
title: "Fetch VAPID public key"
source: "design-spec"
priority: P0
actor: pro-web-push

user_story: |
  The REST endpoint /wp-json/jetonomy/v1/push/vapid-key returns the
  VAPID public key as a base64url-encoded string for client-side
  push subscription.

expectations:
  endpoint_returns_200: true
  public_key_is_base64url: true
  key_length_valid: true
  no_console_errors: true
