flow_id: "A09"
title: "Land on invite link"
source: "design-spec"
priority: P1
actor: anonymous

user_story: |
  As an anonymous visitor with an invite link, when I visit /community/invite/<code>/,
  I expect to see an invite landing page with information about the space
  and a call to action (register or log in to accept). If no invite links
  exist in the DB, this test is skipped.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  invite_landing_visible: true
