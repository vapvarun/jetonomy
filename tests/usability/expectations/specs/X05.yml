flow_id: "X05"
title: "Emoji picker — fixme if not rendered"
source: "design-spec"
priority: P2
actor: cross-cutting

user_story: |
  As a community member writing a reply, I expect an emoji picker
  trigger button near the editor so I can insert emojis. Fixme if
  the emoji picker feature is not yet enabled.

expectations:
  flow_completes_without_error: true
  emoji_trigger_visible_or_fixme: true
