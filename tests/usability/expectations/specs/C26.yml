flow_id: "C26"
title: "Subscribe to a post"
source: "design-spec"
priority: P1
actor: member

user_story: |
  As a member viewing a post, when I click the "Follow" button on the
  post, I expect the button to toggle to "Following" and a subscription
  row to be created in wp_jt_subscriptions for that post so I receive
  notifications on new replies.

expectations:
  button_toggles_to_following: true
  subscription_row_created: true
  no_console_errors: true
  max_clicks_to_subscribe: 1
  max_time_to_goal_seconds: 10
