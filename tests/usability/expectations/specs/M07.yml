flow_id: "M07"
title: "Pin/unpin a post"
source: "design-spec"
priority: P1
actor: moderator

user_story: |
  As a moderator, I want to pin a post to the top of the space and
  later unpin it so that important announcements or discussions are
  prominently visible when needed.

preconditions:
  - A post by bob (user 4) in the welcome space
  - Post starts unpinned

steps:
  - Seed a post by bob, ensure is_pinned=0
  - Login as admin and navigate to the post
  - Open more-menu and click Pin/Sticky
  - Assert pinned indicator appears
  - Verify is_pinned=1 in DB
  - Re-open more-menu and click Unpin
  - Assert pinned indicator disappears
  - Verify is_pinned=0 in DB

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  pin_button_visible: true
  pinned_indicator_appears: true
  unpin_button_visible: true
  pinned_indicator_removed: true
  db_is_pinned_toggles: true
  max_clicks: 6
  max_time_seconds: 15

cleanup:
  - Reset is_pinned to 0
  - Delete the seeded post
