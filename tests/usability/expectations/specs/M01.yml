flow_id: "M01"
title: "Open global moderation queue"
source: "design-spec"
priority: P0
actor: moderator

user_story: |
  As a moderator, I navigate to /community/mod/ and expect to see all
  pending flags listed in the queue. The number of displayed flag items
  must match the count of pending flags in wp_jt_flags. If the queue shows
  fewer items than exist in the database, flagged content could go
  unreviewed. I should reach the queue in zero clicks from the URL.

preconditions:
  - Admin user (id=1) exists

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  queue_container_visible: true
  no_access_denied: true
  no_404: true
  flag_count_consistent_with_db: true
  max_clicks: 0
  max_time_seconds: 5
