flow_id: "M01"
title: "Open global moderation queue"
source: "design-spec"
priority: P0
actor: moderator

user_story: |
  As a moderator (admin), I want to open the moderation queue at
  /community/mod/ so that I can review flagged content, pending items,
  and take action on reported posts and replies.

preconditions:
  - Admin user (id=1) exists

steps:
  - Login as admin (user 1)
  - Navigate to /community/mod/
  - Assert the mod queue container renders
  - Assert a heading is visible
  - Assert no Access Denied or 404 message

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  queue_container_visible: true
  no_access_denied: true
  no_404: true
  max_clicks: 0
  max_time_seconds: 5
