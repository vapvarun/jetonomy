flow_id: "M03"
title: "Mark content as spam"
source: "design-spec"
priority: P0
actor: moderator

user_story: |
  As a moderator, I want to mark a flagged post as spam from the
  moderation queue so that the content is removed from public view and
  the author may face trust level consequences.

preconditions:
  - A post by bob (user 4) with an active flag by alice (user 3)

steps:
  - Seed a post and flag via journey CLI
  - Login as admin and navigate to /community/mod/
  - Find the flagged item in the queue
  - Click the Spam button
  - Assert the item is removed or shows resolved state
  - Verify post status is 'spam' in wp_jt_posts

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  flagged_item_visible_in_queue: true
  post_marked_as_spam: true
  db_post_status_spam: true
  max_clicks: 2
  max_time_seconds: 10

cleanup:
  - Delete flag rows for the post
  - Delete the seeded post
