flow_id: "PRO-BADGES-01"
title: "Admin create badge"
source: "design-spec"
priority: P0
actor: pro-badges

user_story: |
  As an admin, I can create a new badge via the admin page by filling in
  name, description, and tier. The badge is stored in wp_jt_pro_badges.

expectations:
  badge_form_visible: true
  badge_persisted_to_db: true
  success_notice_shown: true
  no_console_errors: true
  max_clicks_to_goal: 3
  max_time_to_goal_seconds: 10
