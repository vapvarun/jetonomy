flow_id: "GA12"
title: "Edit general settings tab"
source: "design-spec"
priority: P0
actor: site-admin

user_story: |
  As a site admin, I visit /wp-admin/admin.php?page=jetonomy-settings
  and expect the General tab to be active with form fields for base_slug
  and posts_per_page visible and editable.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  general_tab_visible: true
  base_slug_field_visible: true
  posts_per_page_field_visible: true
  no_php_fatal: true
