flow_id: "A06"
title: "Search read-only"
source: "design-spec"
priority: P1
actor: anonymous

user_story: |
  As an anonymous visitor, when I navigate to /community/search/?q=test,
  I expect to see search results or a "no results" empty state rendered
  inside the community container. No write actions should be available.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  community_container_visible: true
  search_results_or_empty_state: true
