flow_id: "PRO-REACTIONS-03"
title: "Switch reaction (exclusive)"
source: "design-spec"
priority: P1
actor: pro-reactions

user_story: |
  As a member with an existing reaction, picking a different emoji replaces
  the old one. Only one reaction per user per target should exist in the DB.

expectations:
  old_reaction_replaced: true
  only_one_reaction_in_db: true
  no_console_errors: true
  max_clicks_to_goal: 2
