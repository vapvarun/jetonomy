flow_id: "C09"
title: "Reply to a reply (threaded)"
source: "design-spec"
priority: P0
actor: member

user_story: |
  As a member viewing a post with an existing reply, when I click the
  "Reply" button on that reply, type a nested response, and submit, I
  expect the threaded reply to appear indented under its parent and a
  database row with the correct parent_id to be created.

expectations:
  nested_reply_visible: true
  nesting_indentation_present: true
  reply_has_correct_parent_id: true
  no_console_errors: true
  max_clicks_to_reply: 5
  max_time_to_goal_seconds: 15
