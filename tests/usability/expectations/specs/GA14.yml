flow_id: "GA14"
title: "Settings email tab — from_name / from_email / notification defaults"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin configuring email notifications, I visit the Email tab and
  expect the from_name and from_email inputs to be pre-populated with whatever
  is stored in the jetonomy_settings option. If the fields are empty when the
  DB has values, I risk sending emails with blank sender names or resetting
  my email configuration on save.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  from_name_field_visible: true
  from_email_field_visible: true
  notification_defaults_visible: true
  from_name_matches_db: true
  from_email_matches_db: true
