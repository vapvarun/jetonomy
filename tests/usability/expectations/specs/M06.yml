flow_id: "M06"
title: "Close/lock a post"
source: "design-spec"
priority: P1
actor: moderator

user_story: |
  As a moderator, I want to close/lock a post so that no new replies
  can be added while the existing content remains visible for reference.

preconditions:
  - A post by bob (user 4) in the welcome space
  - Post starts in open (not closed) state

steps:
  - Seed a post by bob
  - Login as admin and navigate to the post
  - Open the more-menu
  - Click Close/Lock
  - Assert a closed/locked indicator appears on the post
  - Verify is_closed=1 in wp_jt_posts

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  close_button_visible_in_menu: true
  closed_indicator_visible: true
  db_is_closed_flag_set: true
  max_clicks: 3
  max_time_seconds: 10

cleanup:
  - Reset is_closed to 0
  - Delete the seeded post
