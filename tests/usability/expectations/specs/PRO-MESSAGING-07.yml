flow_id: "PRO-MESSAGING-07"
title: "Paginate older messages"
source: "design-spec"
priority: P1
actor: pro-messaging

user_story: |
  As a member in a long conversation with 30+ messages, when I scroll up,
  older messages load via cursor-based pagination without a full page reload.

expectations:
  pagination_loads_older_messages: true
  no_full_page_reload: true
  no_console_errors: true
