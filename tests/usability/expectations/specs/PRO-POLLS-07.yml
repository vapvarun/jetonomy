flow_id: "PRO-POLLS-07"
title: "Delete poll"
source: "design-spec"
priority: P1
actor: pro-polls

user_story: |
  As an admin or post author, when I delete a poll, the poll row, all
  options, and all votes are cascade-deleted from the database.

expectations:
  poll_row_deleted: true
  options_cascade_deleted: true
  votes_cascade_deleted: true
  no_console_errors: true
