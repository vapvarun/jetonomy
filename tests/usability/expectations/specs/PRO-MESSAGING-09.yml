flow_id: "PRO-MESSAGING-09"
title: "Mute/unmute conversation"
source: "design-spec"
priority: P1
actor: pro-messaging

user_story: |
  As a member, I can mute a conversation to stop receiving notifications.
  Clicking mute toggles the state in the database. Clicking unmute reverts it.

expectations:
  mute_persists_to_db: true
  unmute_reverts_db: true
  no_console_errors: true
  max_clicks_to_goal: 2
