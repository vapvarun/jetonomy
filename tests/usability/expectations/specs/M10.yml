flow_id: "M10"
title: "Ban a user (global)"
source: "design-spec"
priority: P0
actor: moderator

user_story: |
  As a moderator, I want to globally ban a user so that they can no
  longer access any community features, preventing further abuse or
  policy violations.

preconditions:
  - bob (user 4) exists and is not banned
  - No existing ban restriction row for bob

steps:
  - Clear any existing ban for bob
  - Login as admin and navigate to bob's profile (/community/u/bob/)
  - Find and click the Ban button (mod actions or more-menu)
  - Confirm the ban if a dialog appears
  - Verify a restriction row with type='ban' exists in wp_jt_restrictions

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  ban_button_visible: true
  ban_confirmed: true
  db_restriction_row_created: true
  max_clicks: 4
  max_time_seconds: 10

cleanup:
  - Delete ban restriction row for bob
