flow_id: "PRO-MESSAGING-02"
title: "Compose new DM"
source: "design-spec"
priority: P0
actor: pro-messaging

user_story: |
  As a member, when I click "New Message" in my inbox, I can search for
  a recipient, type a subject and message body, click send, and land on
  the new conversation thread.

expectations:
  compose_form_visible: true
  recipient_search_works: true
  message_sent_to_db: true
  redirect_to_conversation: true
  no_console_errors: true
  max_clicks_to_goal: 4
  max_time_to_goal_seconds: 15
