flow_id: "GA16"
title: "Settings appearance tab — accent color + container width"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin customizing the community appearance, I visit the
  Appearance tab and expect the accent color picker and container width
  input to reflect the values I previously saved. If these fields render
  with defaults instead of my saved values, saving the form would reset
  my branding customization.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  accent_color_field_visible: true
  container_width_field_visible: true
  accent_color_matches_db: true
  container_width_matches_db: true
