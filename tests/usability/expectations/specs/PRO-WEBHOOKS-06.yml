flow_id: "PRO-WEBHOOKS-06"
title: "Auto-disable at threshold"
source: "design-spec"
priority: P1
actor: pro-webhooks

user_story: |
  As a system, when a webhook exceeds the failure threshold, it should
  be auto-disabled to prevent further delivery attempts.

expectations:
  flow_completes_without_error: true
  webhook_auto_disabled: true
