flow_id: "C10"
title: "Quote-to-reply"
source: "design-spec"
priority: P2
actor: member

user_story: |
  As a member reading a reply, when I click the "Quote" button, I expect
  the reply text to be inserted as a blockquote into the composer. After
  I type additional text and submit, the new reply should contain both
  the quoted text and my response.

expectations:
  composer_populated_with_quote: true
  quoted_reply_submitted: true
  no_console_errors: true
  max_clicks_to_reply: 5
  max_time_to_goal_seconds: 15
