flow_id: "PRO-MESSAGING-03"
title: "Compose DM reuse thread"
source: "design-spec"
priority: P0
actor: pro-messaging

user_story: |
  As a member who already has an existing conversation with bob, when I
  compose a new DM to bob, the system should redirect me to the existing
  conversation rather than creating a duplicate thread.

expectations:
  no_duplicate_conversations: true
  redirect_to_existing_thread: true
  no_console_errors: true
  max_clicks_to_goal: 4
