flow_id: "GA20"
title: "Flush rewrite rules via CLI"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin, when I run wp rewrite flush, I expect the command to
  succeed and the Jetonomy /community/* rewrite rules to be present in
  the rules list afterward. Specifically, the space, post, and user profile
  route patterns must be registered so all community URLs resolve correctly.

expectations:
  flow_completes_without_error: true
  rewrite_flush_success: true
  community_rules_present: true
  space_route_registered: true
  post_route_registered: true
  user_route_registered: true
