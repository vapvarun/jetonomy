flow_id: "PRO-FIELDS-08"
title: "Admin delete field"
source: "design-spec"
priority: P1
actor: pro-fields

user_story: |
  As an admin, I can delete a custom field. Deleting it removes the
  field definition and all stored values (cascade delete).

expectations:
  field_deleted_from_db: true
  values_cascade_deleted: true
  no_console_errors: true
  max_clicks_to_goal: 2
