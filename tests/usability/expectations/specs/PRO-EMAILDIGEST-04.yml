flow_id: "PRO-EMAILDIGEST-04"
title: "Click unsubscribe in email"
source: "design-spec"
priority: P0
actor: pro-email-digest

user_story: |
  Each digest email contains an unsubscribe link. Clicking it navigates
  to a page that confirms the digest is disabled, and the user's frequency
  is set to 'none'.

expectations:
  unsubscribe_link_present: true
  clicking_link_disables_digest: true
  frequency_set_to_none: true
  no_console_errors: true
  max_clicks_to_goal: 0
