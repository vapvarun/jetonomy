flow_id: "C29"
title: "View own bookmarks"
source: "design-spec"
priority: P2
actor: member

user_story: |
  As a member who has bookmarked posts, when I visit the Bookmarks tab
  on my profile, I expect to see a list of my saved posts with their
  titles so I can quickly return to content I want to revisit.

expectations:
  bookmarks_tab_active: true
  bookmarked_posts_listed: true
  seeded_post_title_visible: true
  no_console_errors: true
  max_time_to_goal_seconds: 10
