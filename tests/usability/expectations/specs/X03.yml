flow_id: "X03"
title: "oEmbed rendering — YouTube URL becomes iframe"
source: "design-spec"
priority: P1
actor: cross-cutting

user_story: |
  As a community member viewing a post that contains a YouTube URL,
  I expect to see an embedded video player (iframe) instead of a
  plain text URL.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  embed_iframe_visible: true
