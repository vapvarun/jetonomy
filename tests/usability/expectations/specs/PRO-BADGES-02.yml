flow_id: "PRO-BADGES-02"
title: "Manual award to user"
source: "design-spec"
priority: P0
actor: pro-badges

user_story: |
  As an admin, I can manually award a badge to a specific user via the
  admin UI. The award is stored in wp_jt_pro_user_badges.

expectations:
  award_form_visible: true
  award_persisted_to_db: true
  success_notice_shown: true
  no_console_errors: true
  max_clicks_to_goal: 3
