flow_id: "X11"
title: "Trust evaluator cron — CLI runs without fatal"
source: "design-spec"
priority: P0
actor: cross-cutting

user_story: |
  As a site admin, when I run wp jetonomy trust-evaluate, I expect
  the trust evaluator to process users and produce output without
  any fatal errors.

expectations:
  flow_completes_without_error: true
  no_fatal_in_output: true
  output_not_empty: true
