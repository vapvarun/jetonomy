flow_id: "PRO-REACTIONS-01"
title: "React to a post"
source: "design-spec"
priority: P0
actor: pro-reactions

user_story: |
  As a member viewing a post, I can click the reaction button, pick an
  emoji from the picker, and see it appear as a reaction chip on the post.
  The reaction is persisted to wp_jt_pro_reactions.

expectations:
  emoji_picker_opens: true
  reaction_chip_visible: true
  reaction_persisted_to_db: true
  no_console_errors: true
  max_clicks_to_goal: 2
  max_time_to_goal_seconds: 10
