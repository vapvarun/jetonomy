flow_id: "GA15"
title: "Settings SEO tab — SEO options render"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin, when I visit the Jetonomy Settings > SEO tab,
  I expect to see SEO configuration options (meta title patterns,
  noindex toggles, canonical settings) so I can control search
  engine visibility of community pages.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  seo_heading_visible: true
  seo_field_visible: true
