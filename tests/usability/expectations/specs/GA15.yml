flow_id: "GA15"
title: "Settings SEO tab — SEO options render"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin controlling search engine visibility, I visit the SEO tab
  and expect checkbox states (noindex profiles, noindex tags) to reflect
  what is stored in the database. If a checkbox shows unchecked when the DB
  says it should be checked, saving the form would silently re-enable
  indexing of pages I intentionally marked as noindex.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  seo_heading_visible: true
  seo_field_visible: true
  noindex_profiles_matches_db: true
  noindex_tags_matches_db: true
