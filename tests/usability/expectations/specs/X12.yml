flow_id: "X12"
title: "Activity backfill — CLI runs without fatal"
source: "design-spec"
priority: P2
actor: cross-cutting

user_story: |
  As a site admin, when I run wp jetonomy backfill-activity, I
  expect the backfill to complete without fatal errors and produce
  output indicating progress.

expectations:
  flow_completes_without_error: true
  no_fatal_in_output: true
  output_not_empty: true
