flow_id: "GA13"
title: "Settings permissions tab — trust thresholds + rate limits"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin configuring community permissions, I visit the Permissions
  tab and expect to see trust threshold fields pre-populated with values from
  the database, and rate limit fields with their stored numeric values. If
  these inputs show empty or default values when the DB has custom settings,
  I would unknowingly reset my carefully tuned permission configuration on
  the next save.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  trust_threshold_section_visible: true
  rate_limit_section_visible: true
  threshold_inputs_present: true
  rate_limit_inputs_present: true
  threshold_values_populated: true
  rate_limit_values_populated: true
  thresholds_exist_in_db: true
  rate_limits_exist_in_db: true
