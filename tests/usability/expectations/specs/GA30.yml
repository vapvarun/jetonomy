flow_id: "GA30"
title: "REST API — namespace registered, index returns 200"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin or integrator, when I query the Jetonomy REST API
  namespace, I expect it to be registered and the index endpoint to
  return a 200 status with route information.

expectations:
  flow_completes_without_error: true
  namespace_registered: true
  index_status_200: true
  has_routes: true
