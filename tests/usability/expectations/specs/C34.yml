flow_id: "C34"
title: "Update own bio/avatar"
source: "design-spec"
priority: P1
actor: member

user_story: |
  As a member on my profile edit page, when I update my bio text and
  click Save, I expect the new bio to be persisted in
  wp_jt_user_profiles and to appear on my public profile view page.

expectations:
  bio_form_visible: true
  bio_saved_in_db: true
  bio_visible_on_profile: true
  no_console_errors: true
  max_clicks_to_save: 3
  max_time_to_goal_seconds: 15
