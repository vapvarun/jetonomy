flow_id: "C03"
title: "Create an idea post"
source: "design-spec"
priority: P1
actor: member

user_story: |
  As a member of an ideas space, when I fill in a title and description
  for my idea and submit the form, I expect the idea to be saved in the
  database, the browser to redirect to the new idea page, and the form
  heading to indicate I am sharing an idea.

expectations:
  idea_created_in_db: true
  navigated_to_idea_url: true
  form_heading_says_idea: true
  title_visible_on_page: true
  no_console_errors: true
  max_clicks_to_publish: 5
  max_time_to_goal_seconds: 15
