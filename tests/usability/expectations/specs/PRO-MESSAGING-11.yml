flow_id: "PRO-MESSAGING-11"
title: "Trust level gate on send"
source: "design-spec"
priority: P1
actor: pro-messaging

user_story: |
  As a new member with trust level 0, I should not be able to send messages.
  The compose button should be hidden or disabled, and the API should reject
  message creation with a clear permission error.

expectations:
  compose_blocked_for_tl0: true
  api_rejects_tl0_create: true
  clear_error_message: true
  no_console_errors: true
