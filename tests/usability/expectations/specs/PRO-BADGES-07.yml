flow_id: "PRO-BADGES-07"
title: "Multiple grants repeatable"
source: "design-spec"
priority: P2
actor: pro-badges

user_story: |
  A repeatable badge can be awarded to the same user multiple times.
  Each award creates a new row in wp_jt_pro_user_badges.

expectations:
  multiple_award_rows: true
  count_matches_awards: true
  no_console_errors: true
