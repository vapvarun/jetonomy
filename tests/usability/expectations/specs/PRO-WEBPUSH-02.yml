flow_id: "PRO-WEBPUSH-02"
title: "Notification triggers push"
source: "design-spec"
priority: P0
actor: pro-web-push

user_story: |
  When a notification event occurs (e.g., reply to alice's post), and alice
  has a push subscription, the system dispatches a push notification to
  her endpoint.

expectations:
  notification_created: true
  push_dispatch_attempted: true
  subscription_still_active: true
  no_console_errors: true
