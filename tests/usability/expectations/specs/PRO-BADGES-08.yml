flow_id: "PRO-BADGES-08"
title: "Admin delete badge"
source: "design-spec"
priority: P1
actor: pro-badges

user_story: |
  As an admin, I can delete a badge. Deleting it removes the badge
  definition and all user_badge award rows (cascade delete).

expectations:
  badge_deleted_from_db: true
  awards_cascade_deleted: true
  no_console_errors: true
  max_clicks_to_goal: 2
