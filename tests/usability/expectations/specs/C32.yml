flow_id: "C32"
title: "Flag a reply"
source: "design-spec"
priority: P1
actor: member

user_story: |
  As a member viewing a reply by another user, when I click the Flag
  button and submit a reason, I expect a flag row to be created in
  wp_jt_flags for that reply so moderators can review the report.

expectations:
  flag_button_visible: true
  flag_prompt_opens: true
  flag_row_created_in_db: true
  max_clicks_to_flag: 4
  max_time_to_goal_seconds: 15
