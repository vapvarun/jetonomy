flow_id: "SA06"
title: "Manage space members"
source: "design-spec"
priority: P0
actor: space-admin

user_story: |
  As a space admin, I visit the space edit page members tab and expect
  to see a list of members with role selectors and kick/remove controls
  for each member.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  member_list_visible: true
  role_controls_visible: true
  kick_controls_visible: true
