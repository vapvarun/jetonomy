flow_id: "A05"
title: "Browse tag page"
source: "design-spec"
priority: P1
actor: anonymous

user_story: |
  As an anonymous visitor, when I navigate to /community/tag/<slug>/, I expect
  to see tagged content results or a "no results" empty state. The page should
  render inside the community container without a 404.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  community_container_visible: true
  tagged_content_or_empty_state: true
