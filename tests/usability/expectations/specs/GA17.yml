flow_id: "GA17"
title: "Settings anti-spam tab — CAPTCHA + rate limit + honeypot"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin protecting my community from spam, I visit the Anti-Spam
  tab and expect CAPTCHA, rate limit, and honeypot sections to render with
  their current values from the database. Rate limit numeric inputs must
  be pre-populated so I can review and adjust them without guessing what
  the current limits are.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  captcha_section_visible: true
  rate_limit_section_visible: true
  honeypot_section_visible: true
  rate_limit_values_populated: true
  rate_limits_exist_in_db: true
