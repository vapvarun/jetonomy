flow_id: "GA17"
title: "Settings anti-spam tab — CAPTCHA + rate limit + honeypot"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin, when I visit the Jetonomy Settings > Anti-Spam tab,
  I expect to see CAPTCHA configuration, rate limit options, and
  honeypot field toggles so I can protect the community from spam.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  captcha_section_visible: true
  rate_limit_section_visible: true
  honeypot_section_visible: true
