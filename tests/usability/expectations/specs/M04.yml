flow_id: "M04"
title: "Trash flagged content"
source: "design-spec"
priority: P0
actor: moderator

user_story: |
  As a moderator, I want to trash a flagged post from the moderation
  queue so that the content is removed from public view and moved to
  the trash for potential recovery later.

preconditions:
  - A post by bob (user 4) with an active flag by alice (user 3)

steps:
  - Seed a post and flag via journey CLI
  - Login as admin and navigate to /community/mod/
  - Find the flagged item in the queue
  - Click the Trash/Delete button
  - Assert the item is removed or shows resolved state
  - Verify post status is 'trashed' in wp_jt_posts

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  flagged_item_visible_in_queue: true
  post_trashed: true
  db_post_status_trashed: true
  max_clicks: 2
  max_time_seconds: 10

cleanup:
  - Delete flag rows for the post
  - Delete the seeded post
