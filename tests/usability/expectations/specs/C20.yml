flow_id: "C20"
title: "Mark post as read (passive)"
source: "design-spec"
priority: P2
actor: member

user_story: |
  As a logged-in member, when I visit a post I have not read before, I
  expect the system to passively track my visit by creating a row in
  wp_jt_read_status so the post no longer shows as unread in listings.

expectations:
  read_status_row_created: true
  post_page_renders: true
  no_console_errors: true
  max_time_to_goal_seconds: 10
