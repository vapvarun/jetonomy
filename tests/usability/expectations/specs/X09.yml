flow_id: "X09"
title: "GDPR exporter/eraser — privacy hooks registered"
source: "design-spec"
priority: P1
actor: cross-cutting

user_story: |
  As a site admin complying with GDPR, I expect Jetonomy to register
  personal data exporters and erasers with WordPress so user data
  requests include forum content.

expectations:
  flow_completes_without_error: true
  exporter_filter_registered: true
  eraser_filter_registered: true
  jetonomy_exporter_in_list: true
