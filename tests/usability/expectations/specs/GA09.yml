flow_id: "GA09"
title: "Moderation queue admin-side"
source: "design-spec"
priority: P0
actor: site-admin

user_story: |
  As a site admin, I visit the moderation queue page and expect to see all
  pending flags listed in the table. If there are no pending flags, I expect
  a clear empty-state message. The number of displayed flag rows must be
  consistent with SELECT COUNT(*) FROM wp_jt_flags WHERE status='pending'
  so I can trust the queue shows the real moderation workload.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  flag_queue_or_empty_state_visible: true
  no_php_fatal: true
  flag_count_consistent_with_db: true
