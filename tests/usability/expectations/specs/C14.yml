flow_id: "C14"
title: "Upvote a post"
source: "design-spec"
priority: P0
actor: member

user_story: |
  As a space member, when I upvote a post, I expect the vote score to
  increment by 1, the upvote button to show a .voted active state, and
  a vote row to be persisted in wp_jt_votes so I see my vote when I
  return to the page.

expectations:
  score_incremented: true
  upvote_button_active: true
  vote_persisted_in_db: true
  no_console_errors: true
  max_clicks_to_vote: 1
  max_time_to_goal_seconds: 10
