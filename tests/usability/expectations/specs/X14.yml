flow_id: "X14"
title: "Abilities API — jetonomy abilities registered"
source: "design-spec"
priority: P2
actor: cross-cutting

user_story: |
  As a developer or integrator, I expect Jetonomy to register its
  abilities (like jetonomy/create-post) via the WordPress Abilities
  API so external tools can query what the plugin can do.

expectations:
  flow_completes_without_error: true
  create_post_ability_registered: true
  jetonomy_category_registered: true
