flow_id: "M11"
title: "Unban a user"
source: "design-spec"
priority: P1
actor: moderator

user_story: |
  As a moderator, I want to unban a previously banned user so that they
  can regain access to the community after serving their restriction
  period or upon appeal review.

preconditions:
  - bob (user 4) has an existing ban restriction row

steps:
  - Insert a ban restriction row for bob
  - Login as admin and navigate to bob's profile (/community/u/bob/)
  - Find and click the Unban/Remove Ban button
  - Confirm if a dialog appears
  - Verify the ban restriction row is removed from wp_jt_restrictions

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  unban_button_visible: true
  ban_removed: true
  db_restriction_row_absent: true
  max_clicks: 4
  max_time_seconds: 10

cleanup:
  - Ensure ban restriction row is deleted for bob
