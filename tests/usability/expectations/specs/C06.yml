flow_id: "C06"
title: "Edit own post"
source: "design-spec"
priority: P0
actor: member

user_story: |
  As the author of a post, when I open the more-menu and click Edit, I
  expect an inline editor to appear where I can change the title. After
  saving, the updated title should immediately appear on the page without
  requiring a manual refresh.

expectations:
  edit_mode_opens: true
  updated_title_visible: true
  no_console_errors: true
  max_clicks_to_save: 6
  max_time_to_goal_seconds: 15
