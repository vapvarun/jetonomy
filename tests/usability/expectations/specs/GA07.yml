flow_id: "GA07"
title: "Space CRUD"
source: "design-spec"
priority: P0
actor: site-admin

user_story: |
  As a site admin managing forum spaces, I visit the spaces admin page and
  expect to see every space currently in the database listed in the table,
  along with an "Add New" button. The row count in the table must match the
  actual wp_jt_spaces row count so I can trust that no spaces are hidden or
  duplicated in the admin view.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  space_list_visible: true
  add_link_visible: true
  no_php_fatal: true
  space_count_matches_db: true
