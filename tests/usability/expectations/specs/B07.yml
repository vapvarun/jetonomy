flow_id: "B07"
title: "Accept invite link after login"
source: "design-spec"
priority: P1
actor: registered

user_story: |
  As a registered user (bob) with a valid invite link, when I visit
  /community/invite/<code>/ while logged in, I expect to see the invite
  acceptance flow — either an auto-join confirmation, a join button, or
  the space page itself. If no invite links exist, this test is skipped.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  invite_acceptance_flow_visible: true
