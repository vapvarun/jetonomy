flow_id: "GA27"
title: "Plugin deactivation — no fatal, reactivate succeeds"
source: "design-spec"
priority: P0
actor: site-admin

user_story: |
  As a site admin, when I deactivate and reactivate Jetonomy via
  WP-CLI, I expect no fatal errors and the plugin to return to
  active status cleanly.

expectations:
  flow_completes_without_error: true
  deactivate_success: true
  no_fatal_on_deactivation: true
  reactivate_success: true
