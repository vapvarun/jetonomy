flow_id: "PRO-ADVANCEDMODERATION-03"
title: "Block action prevents post"
source: "design-spec"
priority: P0
actor: pro-advanced-moderation

user_story: |
  As a user, when I submit a post matching a block rule, the post should
  be rejected entirely and not appear in the forum.

expectations:
  flow_completes_without_error: true
  post_blocked_or_rejected: true
