flow_id: "PRO-MESSAGING-04"
title: "Create group conversation"
source: "design-spec"
priority: P1
actor: pro-messaging

user_story: |
  As a member, I can compose a message to multiple recipients (bob and admin)
  to create a group conversation. All participants should appear in the
  conversation thread.

expectations:
  group_conversation_created: true
  all_participants_present: true
  no_console_errors: true
  max_clicks_to_goal: 5
