flow_id: "GA04"
title: "Cleanup demo data"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin, after seeding demo data, I run wp jetonomy demo
  cleanup and expect all demo data to be removed and the
  jetonomy_demo_data tracking option to be cleared.

expectations:
  flow_completes_without_error: true
  demo_data_removed: true
  tracking_option_cleared: true
