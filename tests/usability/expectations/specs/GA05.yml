flow_id: "GA05"
title: "View admin dashboard"
source: "design-spec"
priority: P0
actor: site-admin

user_story: |
  As a site admin, I visit the Jetonomy dashboard and expect to see stat
  cards showing post, reply, user, and space counts. These numbers must
  reflect the actual database row counts so I can trust the dashboard as
  a source of truth for community health at a glance.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  dashboard_renders: true
  widgets_visible: true
  no_php_fatal: true
  db_counts_valid: true
  stat_values_numeric: true
