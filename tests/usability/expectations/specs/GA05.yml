flow_id: "GA05"
title: "View admin dashboard"
source: "design-spec"
priority: P0
actor: site-admin

user_story: |
  As a site admin, I visit /wp-admin/admin.php?page=jetonomy and expect
  the dashboard to render with at least one widget/stat card and no
  PHP fatals or console errors.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  dashboard_renders: true
  widgets_visible: true
  no_php_fatal: true
