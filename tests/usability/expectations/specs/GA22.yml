flow_id: "GA22"
title: "Import page — wpForo option renders"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin migrating from wpForo, I visit the Jetonomy import page
  and expect to see a wpForo import option with a functional form or button
  that includes a security nonce. Without a nonce, the import action would
  fail or be vulnerable to CSRF attacks.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  wpforo_option_visible: true
  import_form_or_button_present: true
  nonce_present: true
