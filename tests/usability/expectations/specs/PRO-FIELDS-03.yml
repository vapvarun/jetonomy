flow_id: "PRO-FIELDS-03"
title: "Fill profile field"
source: "design-spec"
priority: P1
actor: pro-fields

user_story: |
  As a member editing my profile, custom profile fields appear on the
  edit page. I can fill them, save, and the values persist.

expectations:
  profile_field_visible: true
  value_persisted_after_save: true
  no_console_errors: true
  max_clicks_to_goal: 1
