flow_id: "PRO-EMAILDIGEST-01"
title: "User sets frequency"
source: "design-spec"
priority: P0
actor: pro-email-digest

user_story: |
  As a member, I can visit my profile edit page and set my digest frequency
  to daily, weekly, or none. The preference persists in user meta.

expectations:
  frequency_selector_visible: true
  preference_persisted: true
  no_console_errors: true
  max_clicks_to_goal: 2
