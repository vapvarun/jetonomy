flow_id: "GA29"
title: "WP-CLI operations — status + qa commands"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin using WP-CLI, when I run wp jetonomy status, I expect to
  see the plugin version and references to posts and spaces with numeric
  counts. When I run wp jetonomy qa, I expect structured check/pass/fail
  output with no PHP fatals. These commands are my primary diagnostic tools
  when troubleshooting community issues via SSH.

expectations:
  flow_completes_without_error: true
  status_contains_version: true
  status_contains_numbers: true
  status_references_posts: true
  status_references_spaces: true
  qa_no_fatal: true
