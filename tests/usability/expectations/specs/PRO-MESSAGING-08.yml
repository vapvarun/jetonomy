flow_id: "PRO-MESSAGING-08"
title: "Mark conversation read"
source: "design-spec"
priority: P0
actor: pro-messaging

user_story: |
  As a member with unread conversations, when I open a conversation, it
  should be automatically marked as read. The unread indicator disappears
  and the read_at timestamp is set in the database.

expectations:
  unread_indicator_removed: true
  read_at_timestamp_set: true
  no_console_errors: true
  max_clicks_to_goal: 2
