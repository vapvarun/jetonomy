flow_id: "A08"
title: "View user profile"
source: "design-spec"
priority: P1
actor: anonymous

user_story: |
  As an anonymous visitor, when I navigate to /community/u/admin/, I expect
  to see the user's public profile with their display name, avatar image,
  and activity stats visible.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  profile_info_visible: true
  avatar_visible: true
