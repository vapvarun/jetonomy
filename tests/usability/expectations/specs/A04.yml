flow_id: "A04"
title: "Read a single post + replies"
source: "design-spec"
priority: P0
actor: anonymous

user_story: |
  As an anonymous visitor, when I navigate to a single post URL, I expect
  to see the post body rendered along with any replies. The page should
  not return a 404 and should have no JavaScript errors.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  post_body_visible: true
  page_not_404: true
