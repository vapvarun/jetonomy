flow_id: "PRO-EMAILDIGEST-07"
title: "Admin views digest stats"
source: "design-spec"
priority: P1
actor: pro-email-digest

user_story: |
  As an admin, I can view digest statistics including total digests sent
  and subscriber count on the email digest settings page.

expectations:
  stats_section_visible: true
  total_sent_displayed: true
  subscriber_count_displayed: true
  no_console_errors: true
  max_clicks_to_goal: 0
  max_time_to_goal_seconds: 5
