flow_id: "GA10"
title: "User list + ban/trust control"
source: "design-spec"
priority: P0
actor: site-admin

user_story: |
  As a site admin, I visit /wp-admin/admin.php?page=jetonomy-users and
  expect the user list table to render with trust level badges/selectors
  and ban/suspend controls for each user.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  user_list_visible: true
  trust_controls_visible: true
  ban_controls_visible: true
  no_php_fatal: true
