flow_id: "PRO-FIELDS-04"
title: "Required field validation"
source: "design-spec"
priority: P1
actor: pro-fields

user_story: |
  When a required custom field is left empty, submitting the form should
  show a validation error and prevent the post from being created.

expectations:
  validation_error_shown: true
  form_not_submitted: true
  stays_on_new_page: true
  no_console_errors: true
  max_clicks_to_goal: 1
