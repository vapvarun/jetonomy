flow_id: "GA19"
title: "Rate limits — values display on permissions tab"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin managing spam prevention via rate limits, I visit the
  permissions tab and expect to see numeric inputs for post, reply, and
  vote rate limits pre-populated from the database. All fields must show
  actual numbers so I can review and adjust limits without guessing the
  current configuration.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  rate_limit_section_visible: true
  rate_limit_inputs_count_greater_than_zero: true
  rate_limits_exist_in_db: true
  all_rate_limit_values_numeric: true
