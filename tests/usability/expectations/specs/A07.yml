flow_id: "A07"
title: "View leaderboard"
source: "design-spec"
priority: P1
actor: anonymous

user_story: |
  As an anonymous visitor, when I navigate to /community/leaderboard/, I expect
  to see a leaderboard table or list showing user rankings. The page should
  render without a 404 and have no JavaScript errors.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  community_container_visible: true
  leaderboard_content_visible: true
