flow_id: "PRO-BADGES-03"
title: "Auto-award via cron"
source: "design-spec"
priority: P0
actor: pro-badges

user_story: |
  When a badge has auto-award criteria (e.g., post_count >= 10) and a
  user meets the criteria, the cron evaluator automatically awards the badge.

expectations:
  cron_evaluates_criteria: true
  badge_auto_awarded: true
  no_console_errors: true
