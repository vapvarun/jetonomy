flow_id: "PRO-MESSAGING-01"
title: "Open messages inbox"
source: "design-spec"
priority: P0
actor: pro-messaging

user_story: |
  As a member with messaging enabled, when I navigate to /community/messages/,
  I expect to see my inbox with a list of conversations, each showing the
  other participant's name, last message preview, and timestamp.

expectations:
  inbox_container_visible: true
  conversation_rows_rendered: true
  no_console_errors: true
  max_clicks_to_goal: 0
  max_time_to_goal_seconds: 5
