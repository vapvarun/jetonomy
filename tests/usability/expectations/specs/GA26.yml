flow_id: "GA26"
title: "Flush object cache — success or fixme"
source: "design-spec"
priority: P2
actor: site-admin

user_story: |
  As a site admin, when I flush the object cache via wp cache flush,
  I expect the command to succeed. If no persistent object cache is
  configured, this test is skipped as a fixme.

expectations:
  flow_completes_without_error: true
  cache_flush_success_or_fixme: true
