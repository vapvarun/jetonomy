flow_id: "PRO-POLLS-08"
title: "Poll auto-closes at closes_at"
source: "design-spec"
priority: P1
actor: pro-polls

user_story: |
  When a poll has a closes_at timestamp in the past, the auto-close cron
  should flip its status to 'closed' automatically.

expectations:
  cron_closes_expired_poll: true
  status_flipped_to_closed: true
  no_console_errors: true
