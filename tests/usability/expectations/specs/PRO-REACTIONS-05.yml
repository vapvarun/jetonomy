flow_id: "PRO-REACTIONS-05"
title: "View aggregated counts"
source: "design-spec"
priority: P1
actor: pro-reactions

user_story: |
  As a member viewing a post with multiple reactions, I see aggregated
  reaction chips showing emoji and count (e.g., thumbsup x2, heart x1).

expectations:
  aggregated_counts_displayed: true
  counts_match_db: true
  no_console_errors: true
  max_clicks_to_goal: 0
