flow_id: "PRO-ADVANCEDMODERATION-02"
title: "Content submission triggers evaluation"
source: "design-spec"
priority: P0
actor: pro-advanced-moderation

user_story: |
  As a user, when I submit a post containing a word that matches a hold
  rule, the post should be evaluated and held for moderation.

expectations:
  flow_completes_without_error: true
  post_status_is_held: true
