flow_id: "C15"
title: "Downvote a post"
source: "design-spec"
priority: P1
actor: member

user_story: |
  As a space member, when I downvote a post, I expect the vote score to
  decrement by 1, the downvote button to show a .voted active state, and
  a vote row with value -1 to be persisted in wp_jt_votes.

expectations:
  score_decremented: true
  downvote_button_active: true
  vote_persisted_in_db: true
  no_console_errors: true
  max_clicks_to_vote: 1
  max_time_to_goal_seconds: 10
