flow_id: "C08"
title: "Reply to a post (flat)"
source: "design-spec"
priority: P0
actor: member

user_story: |
  As a member viewing a post, when I type a reply in the composer and
  click "Post Reply", I expect the reply to appear immediately in the
  thread below the original post and a matching row to be created in
  wp_jt_replies.

expectations:
  reply_visible_in_thread: true
  reply_created_in_db: true
  no_console_errors: true
  max_clicks_to_reply: 3
  max_time_to_goal_seconds: 15
