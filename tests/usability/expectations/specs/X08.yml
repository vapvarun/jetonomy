flow_id: "X08"
title: "Shortcodes — [jetonomy_home] renders community content"
source: "design-spec"
priority: P2
actor: cross-cutting

user_story: |
  As a site admin embedding the community via shortcode, when I add
  [jetonomy_home] to a WordPress page, I expect the Jetonomy community
  interface to render within that page.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  shortcode_registered: true
  jetonomy_markup_visible: true
