flow_id: "GA25"
title: "Send test email — success notification + mail captured"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin configuring email settings, when I click the test
  email button, I expect to see a success notification and the test
  email should be captured by the mail capture system.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  test_email_button_visible: true
  success_notification_shown: true
  mail_captured: true
  max_clicks_to_goal: 2
