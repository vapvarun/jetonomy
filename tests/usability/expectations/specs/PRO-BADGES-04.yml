flow_id: "PRO-BADGES-04"
title: "View own badges on profile"
source: "design-spec"
priority: P1
actor: pro-badges

user_story: |
  As a member, when I visit my profile, I see a badges section showing
  all badges I have earned, with their names and tier icons.

expectations:
  badges_section_visible: true
  awarded_badge_displayed: true
  no_console_errors: true
  max_clicks_to_goal: 0
  max_time_to_goal_seconds: 5
