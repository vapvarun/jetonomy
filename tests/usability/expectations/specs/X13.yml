flow_id: "X13"
title: "Realtime polling — JS loads without errors"
source: "design-spec"
priority: P1
actor: cross-cutting

user_story: |
  As a community member browsing the forum, I expect the Jetonomy polling
  JavaScript to load correctly so that new posts, replies, and notifications
  appear in real time. The view script asset file must exist on disk, the
  Interactivity API directive must be present in the DOM, and there must be
  zero console errors both during page load and after 5 seconds of idle
  time. Any JS error would break real-time updates silently.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  polling_js_loaded: true
  interactivity_directive_present: true
  asset_file_exists: true
  no_errors_after_5s_idle: true
