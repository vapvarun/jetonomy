flow_id: "SA08"
title: "Create sub-space"
source: "design-spec"
priority: P1
actor: space-admin

user_story: |
  As a space admin, I create a sub-space with a parent_id referencing
  an existing space. The new space should have its parent_id column
  set correctly in wp_jt_spaces.

expectations:
  flow_completes_without_error: true
  sub_space_created: true
  parent_id_correct: true
