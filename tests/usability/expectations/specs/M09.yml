flow_id: "M09"
title: "Merge two posts"
source: "design-spec"
priority: P2
actor: moderator
status: fixme

user_story: |
  As a moderator, I want to merge two duplicate or related posts into
  one so that the discussion is consolidated and the community does not
  have fragmented threads on the same topic.

preconditions:
  - Two posts by bob (user 4) in the welcome space
  - Merge UI exists in the post more-menu

steps:
  - Seed two posts (A and B) by bob
  - Login as admin and navigate to post A
  - Open more-menu and click Merge
  - Enter post B as the merge target
  - Confirm the merge
  - Verify post B is no longer published (merged into A)

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  merge_button_visible: true
  target_picker_appears: true
  merged_post_removed: true
  max_clicks: 6
  max_time_seconds: 15

cleanup:
  - Delete both seeded posts
