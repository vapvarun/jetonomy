flow_id: "PRO-BADGES-06"
title: "Idempotent re-award non-repeatable"
source: "design-spec"
priority: P1
actor: pro-badges

user_story: |
  Awarding the same non-repeatable badge to the same user twice should
  be idempotent -- only one row exists in wp_jt_pro_user_badges.

expectations:
  only_one_award_row: true
  no_duplicate_awards: true
  no_console_errors: true
