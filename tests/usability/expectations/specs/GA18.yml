flow_id: "GA18"
title: "Trust thresholds — values display on permissions tab"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin fine-tuning trust levels, I visit the permissions tab and
  expect every trust threshold input to be pre-populated with a numeric
  value from the database. All threshold fields must contain actual numbers
  (not be blank) so I can see and adjust the current progression rules
  without needing to look up the DB directly.

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  trust_section_visible: true
  threshold_inputs_count_greater_than_zero: true
  trust_thresholds_exist_in_db: true
  all_threshold_values_numeric: true
