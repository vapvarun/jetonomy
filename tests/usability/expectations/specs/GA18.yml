flow_id: "GA18"
title: "Trust thresholds — values display on permissions tab"
source: "design-spec"
priority: P1
actor: site-admin

user_story: |
  As a site admin, when I visit the permissions tab, I expect to see
  trust threshold values for each trust level with numeric inputs
  pre-populated from the saved settings (or seeded defaults).

expectations:
  flow_completes_without_error: true
  no_console_errors: true
  trust_section_visible: true
  threshold_inputs_count_greater_than_zero: true
  trust_thresholds_exist_in_db: true
