card_id: "9763494148"
title: "Settings defaults not persisted (trust_thresholds + rate_limits)"
basecamp_url: "https://3.basecamp.com/5798509/buckets/46596502/card_tables/cards/9763494148"
fixed_in_commit: "e5c152c"

user_story: |
  As a site admin on a fresh install, I expect that `wp jetonomy qa`
  reports Settings 6/6 OK immediately after activation without having to
  visit the Permissions tab and save manually. The trust_thresholds and
  rate_limits should be seeded on activation with the canonical defaults
  from Trust_Levels::defaults() and Rate_Limiter::defaults().

reported_symptom: |
  "These keys are missing from jetonomy_settings on this install. Runtime
  behavior is still safe because code falls back to built-in defaults.
  So this is not a user-facing breakage, but it is a real initialization/
  config consistency gap. QA fails."

root_cause: |
  Jetonomy::activate() seeded notification_defaults but never
  trust_thresholds or rate_limits. The runtime readers had ?? fallbacks
  so the product worked, but the stored option was inconsistent with the
  effective config, causing wp jetonomy qa's Settings checks to fail.

expectations:
  trust_thresholds_seeded_on_activation: true
  rate_limits_seeded_on_activation: true
  qa_settings_passes: true
  existing_values_not_overwritten_on_reactivation: true
